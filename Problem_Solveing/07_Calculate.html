<body>
  <h1>Calculate Electricity Bill</h1>
</body>
<script>
  function calculateBill(unit){
    
    let totalBill;

    if(unit <= 100 ){
      totalBill = unit * 5;
    }else if(unit <= 200){
      totalBill = (100 * 5) + (unit - 100) * 7;
    }else if(unit <= 300){
      totalBill = (100 * 5) + (100 * 7) + (unit - 200) * 10;
    }else{
      totalBill = (100 * 5) + (100 * 7) + (100 * 10) + (unit - 300) * 1;
    }
    return totalBill;
  }

  const result = calculateBill(230)
  console.log(result)

</script>
