<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>+ or -</title>
  </head>
  <body>
    <h1>Find the Number is Positive Or Negative</h1>
  </body>
  <script>
    function positiveOrNegative(num) {
      if (num > 0) {
        return 'Positive'
      } else if (num < 0) {
        return 'Negative'
      }
      return 'Zero'
    }
  
    console.log(positiveOrNegative(1))
  </script>
</html>
