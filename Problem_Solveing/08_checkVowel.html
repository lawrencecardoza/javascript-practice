<!doctype html>
<html lang="en">

    <meta charset="UTF-8" />

    <title>Document</title>

  <body>
    <h1>checkVowel</h1>
  </body>
  <script>
    function checkVowels(str) {
      //1
        let vowel = ["a","e","i","o","u"];
        return str.toLowerCase().split('').filter(v => vowel.includes(v)).length;
    }

    console.log(checkVowels("lawrence"))
  </script>
</html>
