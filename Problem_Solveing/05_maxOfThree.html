    <h1>Find the Maximun of Three Number</h1>
  </body>

  <script>

    finfOfThree = (a,b,c,d) => {
      let max;

      // we have to use = in condition taki mein same value miss match ho jaati hai

  
      if(a >= b && a >= c && a >= d){
        max = {a}
      }else if(b >= a && b >= c && b >= d ){
        max = {b}
      }else if(c >= a && c >= b && c >= d){
        max = {c}
      }else{
        max = {d}
      }
      return max
    }
  
    const result = finfOfThree(1,6,9,3);
      // const result = finfOfThree(1,6,6,3); mis match bcoz same value without = (equal)
    console.log("maxNumber",result);
